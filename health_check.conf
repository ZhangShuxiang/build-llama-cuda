#!/bin/bash
# health_check.sh 配置文件
# 放于同目录下，脚本会自动加载

# 服务配置
HOST="localhost"
PORT="8080"
API_KEY="your-api-key-here"

# 阈值配置
MAX_RESPONSE_TIME=5           # 最大响应时间（秒）
MAX_GPU_TEMP=85               # GPU最大温度
MIN_GPU_UTIL=10               # GPU最小利用率（%）
HEALTH_CHECK_INTERVAL=60      # 检查间隔（秒）

# 自动修复
AUTO_RESTART=true
RETRY_COUNT=3
RETRY_INTERVAL=2

# 通知配置
ENABLE_NOTIFY=true
NOTIFY_WEBHOOK="https://your-webhook-url"  # 企业微信/DingTalk/Slack
NOTIFY_EMAIL="admin@example.com"
