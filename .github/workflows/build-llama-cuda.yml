name: Build llama.cpp with CUDA Support

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA Version'
        required: false
        default: '13.2'
        type: choice
        options:
          - '13.2'
      cuda_arch:
        description: 'CUDA Architectures'
        required: false
        default: '80;86;89'
        type: choice
        options:
          - '60;61;70;75;80;86;89'  # 广泛兼容 (Pascal+)
          - '70;75;80;86;89'        # Volta+ (V100, RTX 20/30/40)
          - '80;86;89'              # Ampere+ (RTX 30/40)
          - '89;90'                 # Ada Lovelace + Hopper

jobs:
  build-linux-cuda:
    name: Build CUDA Package
    runs-on: ubuntu-24.04
    timeout-minutes: 90  # ✅ 超时保护
    
    env:
      CUDA_ARCHS: ${{ github.event.inputs.cuda_arch || '80;86;89' }}
      CUDA_VERSION: ${{ github.event.inputs.cuda_version || '13.2' }}
    
    steps:
    # ============================================
    # 步骤1: 安装系统依赖
    # ============================================
    - name: Install system dependencies
      run: |
        sudo -E apt -qqy update
        sudo -E apt -qqy install \
          build-essential \
          cmake \
          git \
          wget \
          curl \
          libcurl4-openssl-dev \
          libssl-dev \
          pkg-config \
          ninja-build \
          gcc-12 \
          g++-12 \
          software-properties-common
        
        # 设置GCC版本
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
    # ============================================
    # 步骤2: 安装 CUDA Toolkit
    # ============================================
    - name: Install CUDA Toolkit
      run: |
        CUDA_PKG="cuda-toolkit-${CUDA_VERSION//./-}"
        
        # 添加 NVIDIA 源
        wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo -E apt -qqy update
        
        # 安装 CUDA Toolkit
        sudo -E apt -qqy install ${CUDA_PKG}
        
        # 设置环境变量
        echo "CUDA_PATH=/usr/local/cuda" >> $GITHUB_ENV
        echo "/usr/local/cuda/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

        # 设置系统环境
        export PATH=/usr/local/cuda/bin:$PATH
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
    # ============================================
    # 步骤3: 克隆本仓库
    # ============================================
    - name: Clone this build
      uses: actions/checkout@v4
    # ============================================
    # 步骤4: 克隆 llama.cpp
    # ============================================
    - name: Clone llama.cpp
      uses: actions/checkout@v4
      with:
        repository: ggml-org/llama.cpp
        ref: master
        path: llama
    # ============================================
    # 步骤5: 编译 llama.cpp (优化版)
    # ============================================
    - name: Build llama.cpp with CUDA
      run: |
        cd llama
        # 创建构建目录
        mkdir -p build && cd build
        # CMake 配置
        cmake .. \
          -G "Ninja" \
          -DGGML_CUDA=ON \
          -DCMAKE_CUDA_ARCHITECTURES="$CUDA_ARCHS" \
          -DBUILD_SHARED_LIBS=OFF \
        # 编译 (使用 Ninja)
        ninja -j$(nproc)
        # 验证产物
        echo "✅ 编译完成"
        ls -la bin/
    # ============================================
    # 步骤7: 打包产物
    # ============================================
    - name: Package artifacts
      run: |
        PACKAGE_DIR="llama-cuda-package"
        mkdir -p $PACKAGE_DIR/{bin,logs}
        # ============================================
        # 1. 只复制必要的可执行文件
        # ============================================
        echo "📁 复制可执行文件..."
        for exe in llama-server llama-cli llama-perplexity llama-bench; do
          if [ -f "llama/build/bin/$exe" ]; then
            # 去除调试符号（减小体积）
            strip llama/build/bin/$exe 2>/dev/null || true
            cp llama/build/bin/$exe $PACKAGE_DIR/bin/
            echo "  ✅ $exe ($(du -h $PACKAGE_DIR/bin/$exe | cut -f1))"
          fi
        done
        chmod +x $PACKAGE_DIR/bin/*
        # ============================================
        # 3. 复制启动脚本
        # ============================================
        echo "📁 复制启动脚本..."
        for script in start_llama_server.sh stop_llama_server.sh llama_server.conf health_check.sh; do
          if [ -f "./$script" ]; then
            cp "./$script" $PACKAGE_DIR/
            [[ "./$script" == *.sh ]] && chmod +x $PACKAGE_DIR/$script
            echo "  ✅ $script ($(du -h $PACKAGE_DIR/$script | cut -f1))"
          fi
        done
        # ============================================
        # 5. 打包并显示大小
        # ============================================
        PACKAGE_NAME="llama-cuda-ubuntu-$(date +%Y-%m-%d)"
        
        echo ""
        echo "=== 包内容大小 ==="
        du -sh $PACKAGE_DIR/*
        
        tar -czf ${PACKAGE_NAME}.tar.gz $PACKAGE_DIR/
        
        echo ""
        echo "✅ 打包完成: ${PACKAGE_NAME}.tar.gz"
        echo "📦 最终大小: $(du -h ${PACKAGE_NAME}.tar.gz | cut -f1)"
    # ============================================
    # 步骤8: 上传产物
    # ============================================
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llama-cuda-Release-${{ github.sha }}
        path: llama-cuda-*.tar.gz
        retention-days: 30
        compression-level: 6
    # ============================================
    # 步骤9: 发布到 Release
    # ============================================
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: llama-cuda-*.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: true
        name: "llama.cpp CUDA ${{ github.ref_name }}"
        body: |
          ## 🚀 llama.cpp CUDA 预编译包
          
          ### 📦 包含内容
          - ✅ llama-server (OpenAI 兼容 API)
          - ✅ llama-cli (命令行推理)
          - ✅ 启动/停止/健康检查脚本
          
          ### 📝 使用方法
          1. 解压: `tar -xzf llama-cuda-*.tar.gz`
          2. 配置: 编辑 `llama_server.conf` 设置模型路径
          3. 启动: `./start_llama_server.sh`
          4. 测试: `curl http://localhost:8080/health`
