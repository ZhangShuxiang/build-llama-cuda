# ==================== 配置文件示例 ====================
# 使用: ./start_llama_server.sh llama_server.conf

# 基础
MODEL_PATH="/models/Llama-3-8B-Instruct-Q4_K_M.gguf"
HOST="0.0.0.0"
PORT="8080"

# GPU (多卡示例: 2张RTX 4090)
USE_GPU=true
GPU_LAYERS=-1           # 全部卸载到GPU
TENSOR_SPLIT="2,2"      # 两张卡平均分
MAIN_GPU=0
GPU_SPLIT_MODE="layer"

# 性能 (大上下文场景)
CONTEXT_SIZE=8192
BATCH_SIZE=1024
UBATCH_SIZE=1024
N_PARALLEL=4
FLASH_ATTN=true

# OpenAI
OPENAI_COMPAT=true
API_KEY="sk-your-api-key-here"  # 生产环境务必设置
CORS=true
CORS_ALLOWED_ORIGINS="https://your-domain.com"

# 日志
VERBOSE=1
LOG_FILE="./logs/llama_server_$(date +%Y%m%d).log"
METRICS=true
